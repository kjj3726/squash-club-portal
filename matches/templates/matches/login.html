<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스쿼시 동호회 - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        /* 화면 정중앙에 카드를 배치하는 스타일 */
        body { background-color: #f4f7f6; font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #fff; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 50px 40px; width: 100%; max-width: 420px; }
        .btn-brand { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border-radius: 12px; font-weight: 600; }
        .btn-brand:hover { color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="mb-4">
        <div class="display-1 mb-3">🎾</div>
        <h3 class="fw-bold text-dark">스쿼시 동호회 포털</h3>
        <p class="text-muted small mt-2">서비스를 이용하려면 먼저 로그인해주세요.</p>
    </div>

    {% if messages %}
        <script>
            {% for message in messages %}
                {% if 'login_error' in message.tags %}
                    alert("{{ message }}");
                {% endif %}
            {% endfor %}
        </script>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="text" name="username" class="form-control form-control-lg mb-3 bg-light border-0" placeholder="접속 아이디" value="{{ login_failed_username }}" required autofocus>
        <input type="password" name="password" class="form-control form-control-lg mb-4 bg-light border-0" placeholder="비밀번호" required>
        <button type="submit" class="btn btn-brand w-100 btn-lg mb-3">로그인</button>
        
        <a href="{% url 'signup' %}" class="text-decoration-none text-muted small hover-primary">아직 계정이 없으신가요? 회원가입</a>
    </form>
</div>

</body>
</html>
